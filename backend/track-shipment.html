<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a1a2e" />
  <title>Track Your Shipment</title>
  <link rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- Injects window.CMP_API_BASE – replaced with the real API Gateway URL at build time -->
  <script src="config.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue:  #007AFF;
      --green: #34C759;
      --bg:    #0f0f1a;
      --card:  #1c1c2e;
      --border:#2c2c3e;
      --text:  #ffffff;
      --muted: #8e8ea0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 16px 40px;
    }
    .logo {
      font-size: 13px; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: var(--muted); margin-bottom: 20px;
    }
    .card {
      width: 100%; max-width: 480px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 14px;
    }
    .card-title {
      font-size: 11px; font-weight: 600; letter-spacing: 1px;
      text-transform: uppercase; color: var(--muted); margin-bottom: 12px;
    }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
    .desc { color: var(--muted); font-size: 14px; margin-bottom: 14px; }
    .row { display:flex; align-items:flex-start; gap:12px; margin-bottom:10px; }
    .dot { width:10px; height:10px; border-radius:50%; margin-top:4px; flex-shrink:0; }
    .dot.blue  { background: var(--blue); }
    .dot.green { background: var(--green); }
    .label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; }
    .addr  { font-size:14px; line-height:1.4; }

    .status-pill {
      display:inline-flex; align-items:center; gap:6px;
      padding:5px 14px; border-radius:20px;
      font-size:13px; font-weight:600;
      background: rgba(52,199,89,0.15); color: var(--green);
      margin-top:12px;
    }

    #map {
      width:100%; max-width:480px; height:260px;
      border-radius:14px; overflow:hidden;
      margin-bottom:14px;
    }

    .stat-grid {
      display:grid; grid-template-columns:1fr 1fr; gap:12px;
    }
    .stat-val  { font-size:22px; font-weight:700; font-variant-numeric:tabular-nums; }
    .stat-unit { font-size:11px; color:var(--muted); margin-top:2px; }
    .location-row {
      display:flex; align-items:flex-start; gap:10px; margin-top:4px;
    }
    .location-icon { font-size:20px; flex-shrink:0; margin-top:2px; }
    .location-addr { font-size:15px; font-weight:600; line-height:1.4; }
    .location-coords { font-size:11px; color:var(--muted); margin-top:2px; }

    .pulse {
      display:inline-block; width:8px; height:8px;
      border-radius:50%; background:var(--green);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:0.4; transform:scale(1.4); }
    }

    .refresh-note {
      font-size:12px; color:var(--muted); text-align:center;
      margin-top:8px;
    }
    .error-banner {
      width:100%; max-width:480px;
      background:rgba(255,59,48,.15); border:1px solid rgba(255,59,48,.3);
      color:#FF3B30; padding:12px 16px; border-radius:12px;
      font-size:13px; margin-bottom:12px; display:none;
    }
    .error-banner.visible { display:block; }
  </style>
</head>
<body>

  <p class="logo" id="company-name">Loading…</p>

  <div id="error-banner" class="error-banner"></div>

  <!-- ── Shipment Info ──────────────────────────────────────────────────── -->
  <div class="card">
    <p class="card-title">Your Shipment</p>
    <h1 id="load-number">Loading…</h1>
    <p class="desc" id="load-desc"></p>

    <div class="row">
      <div class="dot blue"></div>
      <div>
        <div class="label">Pickup</div>
        <div class="addr" id="pickup">—</div>
      </div>
    </div>
    <div class="row">
      <div class="dot green"></div>
      <div>
        <div class="label">Destination</div>
        <div class="addr" id="delivery">—</div>
      </div>
    </div>

    <div class="status-pill">
      <span class="pulse"></span>
      <span id="status-text">In Transit</span>
    </div>
  </div>

  <!-- ── Live Map ───────────────────────────────────────────────────────── -->
  <div id="map"></div>

  <!-- ── Live Stats ────────────────────────────────────────────────────── -->
  <div class="card">
    <p class="card-title">Live Location</p>
    <div class="location-row">
      <div class="location-icon">📍</div>
      <div>
        <div class="location-addr" id="stat-address">Locating driver…</div>
        <div class="location-coords" id="stat-coords"></div>
      </div>
    </div>
    <div class="stat-grid" style="margin-top:16px">
      <div>
        <div class="stat-val" id="stat-speed">—</div>
        <div class="stat-unit">mph</div>
      </div>
      <div>
        <div class="stat-val" id="stat-updated">—</div>
        <div class="stat-unit">Last update</div>
      </div>
    </div>
    <p class="refresh-note">📡 Updates every 30 seconds</p>
  </div>

  <!-- ── Delivery Info ─────────────────────────────────────────────────── -->
  <div class="card">
    <p class="card-title">Estimated Delivery</p>
    <div style="font-size:20px;font-weight:600;" id="est-delivery">—</div>
    <div style="font-size:13px;color:var(--muted);margin-top:4px;">
      Subject to road conditions
    </div>
  </div>

  <script>
    function showError(msg) {
      const el = document.getElementById("error-banner");
      el.textContent = msg;
      el.classList.add("visible");
      // Blank out "Loading…" so it doesn't look stuck
      const ln = document.getElementById("load-number");
      if (ln && ln.textContent === "Loading…") ln.textContent = "—";
    }

    const params  = new URLSearchParams(location.search);
    const TOKEN   = params.get("token");
    const REFRESH_MS = 30000;

    // CMP_API_BASE is set by config.js (injected at Amplify build time).
    // If it still contains the placeholder the build step didn't run – warn loudly.
    const _raw = window.CMP_API_BASE || "";
    const API_BASE = (_raw && _raw !== "__API_BASE__")
      ? _raw.replace(/\/$/, "")          // trim any trailing slash
      : null;

    let map, driverMarker, trailPolyline;
    let lastGeocodedLatLng = null;

    async function reverseGeocode(lat, lng) {
      // Only re-geocode if moved more than ~50m
      if (lastGeocodedLatLng) {
        const d = Math.abs(lat - lastGeocodedLatLng[0]) + Math.abs(lng - lastGeocodedLatLng[1]);
        if (d < 0.0005) return null; // no change needed
      }
      try {
        const r = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`);
        if (!r.ok) return null;
        const d = await r.json();
        lastGeocodedLatLng = [lat, lng];
        const a = d.address || {};
        // Build a clean human-readable string
        const parts = [
          a.road || a.pedestrian || a.path,
          a.suburb || a.neighbourhood || a.city_district,
          a.city || a.town || a.village,
          a.state
        ].filter(Boolean);
        return parts.length ? parts.join(', ') : (d.display_name || null);
      } catch(e) { return null; }
    }

    function filterRecentLocations(history) {
      if (!history || !history.length) return [];
      const cutoff = Date.now() - (4 * 60 * 60 * 1000); // 4 hours
      return history.filter(p => p.timestamp && new Date(p.timestamp).getTime() >= cutoff);
    }

    (async function init() {
      if (!TOKEN) {
        showError("Invalid tracking link – no token found in the URL.");
        return;
      }
      if (!API_BASE) {
        showError(
          "Tracking is temporarily unavailable (configuration error). " +
          "Please contact support for assistance."
        );
        console.error(
          "CMP: API base URL is not configured. " +
          "Set the CMP_API_BASE environment variable in Amplify and redeploy."
        );
        return;
      }
      initMap();
      await fetchAndRender();
      setInterval(fetchAndRender, REFRESH_MS);
    })();

    function initMap() {
      map = L.map("map", { zoomControl: true, attributionControl: false })
             .setView([39.5, -98.35], 4);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19, attribution: "© OpenStreetMap",
      }).addTo(map);
    }

    function snapToRoads(history, callback){
      if(!history || history.length < 2){ callback(null); return; }

      // Subsample to OSRM /match limit of 100 waypoints
      var pts = history.slice();
      if(pts.length > 100){
        var step = (pts.length - 1) / 99;
        var sampled = [];
        for(var i = 0; i < 99; i++) sampled.push(pts[Math.round(i * step)]);
        sampled.push(pts[pts.length - 1]);
        pts = sampled;
      }

      // Build strictly-increasing timestamps (OSRM requirement — fix duplicates)
      var rawTs = pts.map(function(p){
        return p.timestamp ? Math.floor(new Date(p.timestamp).getTime() / 1000) : 0;
      });
      var allValid = rawTs.every(function(t){ return t > 0; });
      var monoTs = rawTs.slice();
      for(var i = 1; i < monoTs.length; i++){
        if(monoTs[i] <= monoTs[i-1]) monoTs[i] = monoTs[i-1] + 1;
      }

      var coordStr  = pts.map(function(p){ return p.longitude+','+p.latitude; }).join(';');
      var radiusStr = pts.map(function(){ return '25'; }).join(';');

      var matchUrl = 'https://router.project-osrm.org/match/v1/driving/' + coordStr
        + '?overview=full&geometries=geojson&steps=false'
        + '&radiuses=' + radiusStr
        + '&tidy=true'
        + (allValid ? '&timestamps=' + monoTs.join(';') : '');

      fetch(matchUrl)
        .then(function(r){ return r.ok ? r.json() : null; })
        .then(function(data){
          if(data && data.matchings && data.matchings.length){
            var roadCoords = [];
            data.matchings.forEach(function(m){
              m.geometry.coordinates.forEach(function(c){
                roadCoords.push([c[1], c[0]]);
              });
            });
            if(roadCoords.length >= 2){ callback(roadCoords); return; }
          }
          // /match failed — fall back to /route (start → end)
          var first = pts[0], last = pts[pts.length - 1];
          var routeUrl = 'https://router.project-osrm.org/route/v1/driving/'
            + first.longitude+','+first.latitude + ';' + last.longitude+','+last.latitude
            + '?overview=full&geometries=geojson&steps=false';
          return fetch(routeUrl)
            .then(function(r){ return r.ok ? r.json() : null; })
            .then(function(d){
              if(d && d.routes && d.routes.length){
                var rc = d.routes[0].geometry.coordinates.map(function(c){ return [c[1],c[0]]; });
                callback(rc.length >= 2 ? rc : null);
              } else { callback(null); }
            });
        })
        .catch(function(){ callback(null); });
    }

    async function fetchAndRender() {
      try {
        const res = await fetch(`${API_BASE}/track/${TOKEN}`);
        if (res.status === 404) {
          showError("Shipment not found. The tracking link may be invalid or expired.");
          return;
        }
        if (!res.ok) {
          const json = await res.json().catch(() => ({}));
          throw new Error(json.error || `Server error (${res.status})`);
        }
        const data = await res.json();

        document.getElementById("company-name").textContent = data.companyName || "CMP Logistics";
        document.getElementById("load-number").textContent = data.loadNumber || "—";
        document.getElementById("load-desc").textContent   = data.description || "";
        document.getElementById("pickup").textContent      = data.pickupAddress || "—";
        document.getElementById("delivery").textContent    = data.deliveryAddress || "—";
        document.getElementById("status-text").textContent = data.status || "In Transit";

        if (data.deliveryDate) {
          document.getElementById("est-delivery").textContent =
            new Date(data.deliveryDate).toLocaleString(undefined,
              { month:"short", day:"numeric", hour:"numeric", minute:"2-digit" });
        }

        if (data.lastLocation) {
          const loc = data.lastLocation;
          const lat = loc.latitude;
          const lng = loc.longitude;

          // Update stats
          document.getElementById("stat-speed").textContent =
            loc.speed != null ? Math.round(loc.speed) : "0";
          document.getElementById("stat-updated").textContent =
            loc.timestamp ? new Date(loc.timestamp).toLocaleTimeString() : "—";
          // Show coords as subtle secondary info
          document.getElementById("stat-coords").textContent =
            `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
          // Reverse geocode for human-readable address
          reverseGeocode(lat, lng).then(addr => {
            if (addr) document.getElementById("stat-address").textContent = addr;
            else document.getElementById("stat-address").textContent = `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
          });

          // Draw trail snapped to roads using OSRM (falls back to straight line)
          const recentHistory = filterRecentLocations(data.locationHistory);
          if (recentHistory.length >= 2) {
            snapToRoads(recentHistory, function(roadPts) {
              const coords = (roadPts && roadPts.length >= 2)
                ? roadPts
                : recentHistory.map(p => [p.latitude, p.longitude]);
              if (trailPolyline) {
                trailPolyline.setLatLngs(coords);
              } else {
                trailPolyline = L.polyline(coords, {
                  color: '#007AFF', weight: 4, opacity: 0.8,
                  lineJoin: 'round', lineCap: 'round',
                }).addTo(map);
              }
            });
          } else if (trailPolyline) {
            trailPolyline.setLatLngs([]);
          }

          // Update map marker
          const truckIcon = L.divIcon({
            html: `<div style="font-size:26px;line-height:1;">🚛</div>`,
            className: "",
            iconSize: [30, 30],
            iconAnchor: [15, 15],
          });

          if (!driverMarker) {
            driverMarker = L.marker([lat, lng], { icon: truckIcon }).addTo(map);
            // Fit map to trail if we have history, otherwise just zoom in
            if (trailPolyline) {
              map.fitBounds(trailPolyline.getBounds().pad(0.2));
            } else {
              map.setView([lat, lng], 13);
            }
          } else {
            driverMarker.setLatLng([lat, lng]);
            map.panTo([lat, lng]);
          }
        }
      } catch (err) {
        showError("Could not load tracking data: " + err.message);
      }
    }
  </script>
</body>
</html>
