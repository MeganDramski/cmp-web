AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: CMP Tracking Backend – API Gateway + Lambda + DynamoDB

# ─────────────────────────────────────────────────────────────────
# Globals
# ─────────────────────────────────────────────────────────────────
Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 15
    MemorySize: 256
    Environment:
      Variables:
        USERS_TABLE:      !Ref UsersTable
        LOADS_TABLE:      !Ref LoadsTable
        LOCATIONS_TABLE:  !Ref LocationsTable
        COMPANIES_TABLE:  !Ref CompaniesTable
        JWT_SECRET:         !Ref JwtSecret
        STRIPE_SECRET:      !Ref StripeSecret
        STRIPE_WEBHOOK_SECRET: !Ref StripeWebhookSecret
        SES_FROM_EMAIL:     !Ref SesFromEmail
        AMPLIFY_BASE_URL:    !Ref AmplifyBaseUrl
        TRACKING_BASE_URL:   !Ref TrackingBaseUrl
        APPROVAL_ADMINS:     !Ref ApprovalAdmins
  HttpApi:
    CorsConfiguration:
      AllowOrigins:
        - "*"
      AllowHeaders:
        - Content-Type
        - Authorization
        - Stripe-Signature
      AllowMethods:
        - GET
        - POST
        - PATCH
        - PUT
        - DELETE
        - OPTIONS

Parameters:
  JwtSecret:
    Type: String
    NoEcho: true
    Default: ""
    Description: JWT signing secret. Pass via --parameter-overrides JwtSecret=<value>

  StripeSecret:
    Type: String
    NoEcho: true
    Default: ""
    Description: Stripe secret key (sk_live_... or sk_test_...)

  StripeWebhookSecret:
    Type: String
    NoEcho: true
    Default: ""
    Description: Stripe webhook signing secret (whsec_...)

  SesFromEmail:
    Type: String
    Default: "no-reply@yourdomain.com"
    Description: >
      SES-verified sender address used for dispatcher & customer emails.
      Must be verified in Amazon SES before deploying.

  AmplifyBaseUrl:
    Type: String
    Default: ""
    Description: Amplify frontend URL e.g. https://main.dkyps2bncnu4g.amplifyapp.com

  ApprovalAdmins:
    Type: String
    Default: "megandramski@gmail.com,dispatch@cmplogistics.ca"
    Description: Comma-separated admin emails that receive sign-up approval requests

  TrackingBaseUrl:
    Type: String
    Default: ""
    Description: API Gateway base URL e.g. https://0hn5wgrru8.execute-api.us-east-1.amazonaws.com

  # Twilio parameters kept as stubs so the existing CloudFormation stack does
  # not fail when these parameter keys are no longer supplied.
  # They are not passed to any Lambda and can be removed after a clean deploy.
  TwilioAccountSid:
    Type: String
    Default: ""
    Description: "(unused – Twilio removed)"
  TwilioAuthToken:
    Type: String
    Default: ""
    NoEcho: true
    Description: "(unused – Twilio removed)"
  TwilioFromNumber:
    Type: String
    Default: ""
    Description: "(unused – Twilio removed)"

# ─────────────────────────────────────────────────────────────────
# DynamoDB Tables
# ─────────────────────────────────────────────────────────────────
Resources:

  # Companies table  (PK = tenantId)
  CompaniesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: cmp-companies
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: tenantId
          AttributeType: S
      KeySchema:
        - AttributeName: tenantId
          KeyType: HASH

  # Users table  (PK = email) + TenantIndex GSI
  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: cmp-users
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: email
          AttributeType: S
        - AttributeName: tenantId
          AttributeType: S
      KeySchema:
        - AttributeName: email
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: TenantIndex
          KeySchema:
            - AttributeName: tenantId
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  # Loads table  (PK = id) + TrackingTokenIndex + TenantIndex GSIs
  LoadsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: cmp-loads
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: trackingToken
          AttributeType: S
        - AttributeName: tenantId
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: TrackingTokenIndex
          KeySchema:
            - AttributeName: trackingToken
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: TenantIndex
          KeySchema:
            - AttributeName: tenantId
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  # Locations table  (PK = loadId, SK = timestamp)
  LocationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: cmp-locations
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: loadId
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: S
      KeySchema:
        - AttributeName: loadId
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE

# ─────────────────────────────────────────────────────────────────
# Shared IAM Role
# ─────────────────────────────────────────────────────────────────
  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: cmp-tracking-lambda-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource:
                  - !GetAtt UsersTable.Arn
                  - !Sub "${UsersTable.Arn}/index/*"
                  - !GetAtt LoadsTable.Arn
                  - !Sub "${LoadsTable.Arn}/index/*"
                  - !GetAtt LocationsTable.Arn
                  - !GetAtt CompaniesTable.Arn
                  - !Sub "${CompaniesTable.Arn}/index/*"
        - PolicyName: SESAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ses:SendEmail
                  - ses:SendRawEmail
                Resource: "*"

# ─────────────────────────────────────────────────────────────────
# Lambda Functions
# ─────────────────────────────────────────────────────────────────

  # POST /companies/register
  RegisterCompanyFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cmp-register-company
      CodeUri: src/
      Handler: handlers/registerCompany.handler
      Role: !GetAtt LambdaRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /companies/register
            Method: POST

  # POST /billing/checkout  (create Stripe checkout session)
  CreateCheckoutSessionFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cmp-create-checkout-session
      CodeUri: src/
      Handler: handlers/createCheckoutSession.handler
      Role: !GetAtt LambdaRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /billing/checkout
            Method: POST

  # POST /stripe/webhook  (Stripe event handler — raw body required)
  StripeWebhookFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cmp-stripe-webhook
      CodeUri: src/
      Handler: handlers/stripeWebhook.handler
      Role: !GetAtt LambdaRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /stripe/webhook
            Method: POST

  # POST /users/register  (driver self-register under a tenant)
  RegisterFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cmp-register
      CodeUri: src/
      Handler: handlers/register.handler
      Role: !GetAtt LambdaRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /users/register
            Method: POST

  # GET /users/approve
  ApproveUserFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cmp-approve-user
      CodeUri: src/
      Handler: handlers/approveUser.handler
      Role: !GetAtt LambdaRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /users/approve
            Method: GET

  # POST /users/login
  LoginFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cmp-login
      CodeUri: src/
      Handler: handlers/login.handler
      Role: !GetAtt LambdaRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /users/login
            Method: POST

  # GET /loads
  GetLoadsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cmp-get-loads
      CodeUri: src/
      Handler: handlers/getLoads.handler
      Role: !GetAtt LambdaRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /loads
            Method: GET

  # POST /loads
  CreateLoadFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cmp-create-load
      CodeUri: src/
      Handler: handlers/createLoad.handler
      Role: !GetAtt LambdaRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /loads
            Method: POST

  # PATCH /loads/{id}/status
  UpdateLoadStatusFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cmp-update-load-status
      CodeUri: src/
      Handler: handlers/updateLoadStatus.handler
      Role: !GetAtt LambdaRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /loads/{id}/status
            Method: PATCH

  # PUT /loads/{id}
  UpdateLoadFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cmp-update-load
      CodeUri: src/
      Handler: handlers/updateLoad.handler
      Role: !GetAtt LambdaRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /loads/{id}
            Method: PUT

  # DELETE /loads/{id}
  DeleteLoadFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cmp-delete-load
      CodeUri: src/
      Handler: handlers/deleteLoad.handler
      Role: !GetAtt LambdaRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /loads/{id}
            Method: DELETE

  # POST /loads/{id}/accept
  AcceptLoadFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cmp-accept-load
      CodeUri: src/
      Handler: handlers/acceptLoad.handler
      Role: !GetAtt LambdaRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /loads/{id}/accept
            Method: POST

  # PATCH /loads/{id}/assign
  AssignDriverFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cmp-assign-driver
      CodeUri: src/
      Handler: handlers/assignDriver.handler
      Role: !GetAtt LambdaRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /loads/{id}/assign
            Method: PATCH

  # GET /users
  GetUsersFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cmp-get-users
      CodeUri: src/
      Handler: handlers/getUsers.handler
      Role: !GetAtt LambdaRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /users
            Method: GET

  # POST /locations
  PostLocationFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cmp-post-location
      CodeUri: src/
      Handler: handlers/postLocation.handler
      Role: !GetAtt LambdaRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /locations
            Method: POST

  # GET /loads/{id}/location
  GetLocationFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cmp-get-location
      CodeUri: src/
      Handler: handlers/getLocation.handler
      Role: !GetAtt LambdaRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /loads/{id}/location
            Method: GET

  # GET /track/{token}
  TrackByTokenFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cmp-track-by-token
      CodeUri: src/
      Handler: handlers/trackByToken.handler
      Role: !GetAtt LambdaRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /track/{token}
            Method: GET

  # POST /loads/{id}/send-driver-link
  SendDriverLinkFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cmp-send-driver-link
      CodeUri: src/
      Handler: handlers/sendDriverLink.handler
      Role: !GetAtt LambdaRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /loads/{id}/send-driver-link
            Method: POST

  # POST /track/{token}/start
  StartTrackingFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cmp-start-tracking
      CodeUri: src/
      Handler: handlers/startTracking.handler
      Role: !GetAtt LambdaRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /track/{token}/start
            Method: POST

  # POST /track/{token}/location
  PostLocationPublicFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cmp-post-location-public
      CodeUri: src/
      Handler: handlers/postLocationPublic.handler
      Role: !GetAtt LambdaRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /track/{token}/location
            Method: POST

  # PATCH /track/{token}/status
  UpdateStatusByTokenFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cmp-update-status-by-token
      CodeUri: src/
      Handler: handlers/updateStatusByToken.handler
      Role: !GetAtt LambdaRole.Arn
      Events:
        ApiPatch:
          Type: HttpApi
          Properties:
            Path: /track/{token}/status
            Method: PATCH
        ApiOptions:
          Type: HttpApi
          Properties:
            Path: /track/{token}/status
            Method: OPTIONS
