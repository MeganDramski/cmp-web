AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: CMP Tracking Backend – API Gateway + Lambda + DynamoDB

# ─────────────────────────────────────────────────────────────────
# Globals
# ─────────────────────────────────────────────────────────────────
Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 15
    MemorySize: 256
    Environment:
      Variables:
        USERS_TABLE:     !Ref UsersTable
        LOADS_TABLE:     !Ref LoadsTable
        LOCATIONS_TABLE: !Ref LocationsTable
        JWT_SECRET:        !Ref JwtSecret
        SES_FROM_EMAIL:    !Ref SesFromEmail
        TWILIO_ACCOUNT_SID: !Ref TwilioAccountSid
        TWILIO_AUTH_TOKEN:  !Ref TwilioAuthToken
        TWILIO_FROM_NUMBER: !Ref TwilioFromNumber
        AMPLIFY_BASE_URL:   !Ref AmplifyBaseUrl
        TRACKING_BASE_URL:  !Ref TrackingBaseUrl
        APPROVAL_ADMINS:    !Ref ApprovalAdmins
  HttpApi:
    CorsConfiguration:
      AllowOrigins:
        - "*"
      AllowHeaders:
        - Content-Type
        - Authorization
      AllowMethods:
        - GET
        - POST
        - PATCH
        - DELETE
        - OPTIONS

Parameters:
  JwtSecret:
    Type: String
    NoEcho: true
    Default: ""
    Description: JWT signing secret. Pass via --parameter-overrides JwtSecret=<value>

  SesFromEmail:
    Type: String
    Default: "no-reply@yourdomain.com"
    Description: >
      SES-verified sender address used for dispatcher & customer emails.
      Must be verified in Amazon SES before deploying.

  TwilioAccountSid:
    Type: String
    Default: ""
    Description: Twilio Account SID from twilio.com/console
  TwilioAuthToken:
    Type: String
    NoEcho: true
    Default: ""
    Description: Twilio Auth Token
  TwilioFromNumber:
    Type: String
    Default: ""
    Description: Twilio phone number e.g. +15005550006
  AmplifyBaseUrl:
    Type: String
    Default: ""
    Description: Amplify frontend URL e.g. https://main.dkyps2bncnu4g.amplifyapp.com

  ApprovalAdmins:
    Type: String
    Default: "megandramski@gmail.com,dispatch@cmplogistics.ca"
    Description: Comma-separated admin emails that receive sign-up approval requests

  TrackingBaseUrl:
    Type: String
    Default: ""
    Description: API Gateway base URL e.g. https://0hn5wgrru8.execute-api.us-east-1.amazonaws.com

# ─────────────────────────────────────────────────────────────────
# DynamoDB Tables
# ─────────────────────────────────────────────────────────────────
Resources:

  # Users table  (PK = email)
  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: cmp-users
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: email
          AttributeType: S
      KeySchema:
        - AttributeName: email
          KeyType: HASH

  # Loads table  (PK = id)
  LoadsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: cmp-loads
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: trackingToken
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: TrackingTokenIndex
          KeySchema:
            - AttributeName: trackingToken
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  # Locations table  (PK = loadId, SK = timestamp)
  LocationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: cmp-locations
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: loadId
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: S
      KeySchema:
        - AttributeName: loadId
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE

# ─────────────────────────────────────────────────────────────────
# Shared IAM Role for all Lambdas
# ─────────────────────────────────────────────────────────────────
  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: cmp-tracking-lambda-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource:
                  - !GetAtt UsersTable.Arn
                  - !GetAtt LoadsTable.Arn
                  - !Sub "${LoadsTable.Arn}/index/*"
                  - !GetAtt LocationsTable.Arn
        - PolicyName: SESAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ses:SendEmail
                  - ses:SendRawEmail
                Resource: "*"
        - PolicyName: SNSAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: "*"

# ─────────────────────────────────────────────────────────────────
# Lambda Functions
# ─────────────────────────────────────────────────────────────────

  # POST /users/register
  RegisterFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cmp-register
      CodeUri: src/
      Handler: handlers/register.handler
      Role: !GetAtt LambdaRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /users/register
            Method: POST

  # GET /users/approve?token= (admin clicks Approve/Deny in email)
  ApproveUserFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cmp-approve-user
      CodeUri: src/
      Handler: handlers/approveUser.handler
      Role: !GetAtt LambdaRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /users/approve
            Method: GET

  # GET /users/approve?token= (admin clicks Approve/Deny in email)
  ApproveUserFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cmp-approve-user
      CodeUri: src/
      Handler: handlers/approveUser.handler
      Role: !GetAtt LambdaRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /users/approve
            Method: GET

  # POST /users/login
  LoginFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cmp-login
      CodeUri: src/
      Handler: handlers/login.handler
      Role: !GetAtt LambdaRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /users/login
            Method: POST

  # GET /loads  (dispatcher – all loads)
  GetLoadsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cmp-get-loads
      CodeUri: src/
      Handler: handlers/getLoads.handler
      Role: !GetAtt LambdaRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /loads
            Method: GET

  # POST /loads  (dispatcher – create load)
  CreateLoadFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cmp-create-load
      CodeUri: src/
      Handler: handlers/createLoad.handler
      Role: !GetAtt LambdaRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /loads
            Method: POST

  # PATCH /loads/{id}/status
  UpdateLoadStatusFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cmp-update-load-status
      CodeUri: src/
      Handler: handlers/updateLoadStatus.handler
      Role: !GetAtt LambdaRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /loads/{id}/status
            Method: PATCH

  UpdateLoadFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cmp-update-load
      CodeUri: src/
      Handler: handlers/updateLoad.handler
      Role: !GetAtt LambdaRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /loads/{id}
            Method: PUT
  # DELETE /loads/{id}
  DeleteLoadFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cmp-delete-load
      CodeUri: src/
      Handler: handlers/deleteLoad.handler
      Role: !GetAtt LambdaRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /loads/{id}
            Method: DELETE

  # POST /loads/{id}/accept  (driver accepts an assigned load)
  AcceptLoadFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cmp-accept-load
      CodeUri: src/
      Handler: handlers/acceptLoad.handler
      Role: !GetAtt LambdaRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /loads/{id}/accept
            Method: POST

  # PATCH /loads/{id}/assign
  AssignDriverFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cmp-assign-driver
      CodeUri: src/
      Handler: handlers/assignDriver.handler
      Role: !GetAtt LambdaRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /loads/{id}/assign
            Method: PATCH

  # GET /users  (dispatcher – list drivers/dispatchers)
  GetUsersFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cmp-get-users
      CodeUri: src/
      Handler: handlers/getUsers.handler
      Role: !GetAtt LambdaRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /users
            Method: GET

  # POST /locations  (driver – push GPS fix)
  PostLocationFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cmp-post-location
      CodeUri: src/
      Handler: handlers/postLocation.handler
      Role: !GetAtt LambdaRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /locations
            Method: POST

  # GET /loads/{id}/location  (latest location for a load)
  GetLocationFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cmp-get-location
      CodeUri: src/
      Handler: handlers/getLocation.handler
      Role: !GetAtt LambdaRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /loads/{id}/location
            Method: GET

  # GET /track/{token}  (public – customer tracking, no auth)
  TrackByTokenFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cmp-track-by-token
      CodeUri: src/
      Handler: handlers/trackByToken.handler
      Role: !GetAtt LambdaRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /track/{token}
            Method: GET

  # POST /loads/{id}/send-driver-link  (dispatcher – SMS driver with browser tracking link)
  SendDriverLinkFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cmp-send-driver-link
      CodeUri: src/
      Handler: handlers/sendDriverLink.handler
      Role: !GetAtt LambdaRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /loads/{id}/send-driver-link
            Method: POST

  # POST /track/{token}/start  (public – driver taps Start Tracking in browser)
  StartTrackingFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cmp-start-tracking
      CodeUri: src/
      Handler: handlers/startTracking.handler
      Role: !GetAtt LambdaRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /track/{token}/start
            Method: POST

  # POST /track/{token}/location  (public – driver browser posts GPS, no auth needed)
  PostLocationPublicFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cmp-post-location-public
      CodeUri: src/
      Handler: handlers/postLocationPublic.handler
      Role: !GetAtt LambdaRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
          Properties:
            ApiId: !Ref HttpApief HttpApiief HttpApiief HttpApiief HttpApi
