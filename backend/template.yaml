AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: CMP Tracking Backend - API Gateway + Lambda + DynamoDB

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 15
    MemorySize: 256
    Environment:
      Variables:
        USERS_TABLE:       !Ref UsersTable
        LOADS_TABLE:       !Ref LoadsTable
        LOCATIONS_TABLE:   !Ref LocationsTable
        JWT_SECRET:        !Ref JwtSecret
        SES_FROM_EMAIL:    !Ref SesFromEmail
  HttpApi:
    CorsConfiguration:
      AllowOrigins:
        - "*"
      AllowHeaders:
        - Content-Type
        - Authorization
      AllowMethods:
        - GET
        - POST
        - PATCH
        - DELETE
        - OPTIONS

Parameters:
  JwtSecret:
    Type: String
    NoEcho: true
    Default: ""
    Description: JWT signing secret
  SesFromEmail:
    Type: String
    Default: "no-reply@yourdomain.com"
    Description: SES-verified sender address

Resources:

  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: cmp-users
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: email
          AttributeType: S
      KeySchema:
        - AttributeName: email
          KeyType: HASH

  LoadsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: cmp-loads
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: trackingToken
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: TrackingTokenIndex
          KeySchema:
            - AttributeName: trackingToken
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  LocationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: cmp-locations
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: loadId
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: S
      KeySchema:
        - AttributeName: loadId
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE

  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: cmp-tracking-lambda-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource:
                  - !GetAtt UsersTable.Arn
                  - !GetAtt LoadsTable.Arn
                  - !Sub "${LoadsTable.Arn}/index/*"
                  - !GetAtt LocationsTable.Arn
        - PolicyName: SESAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: [ses:SendEmail, ses:SendRawEmail]
                Resource: "*"
        - PolicyName: SNSAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: [sns:Publish]
                Resource: "*"

  RegisterFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cmp-register
      CodeUri: src/
      Handler: handlers/register.handler
      Role: !GetAtt LambdaRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /users/register
            Method: POST

  LoginFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cmp-login
      CodeUri: src/
      Handler: handlers/login.handler
      Role: !GetAtt LambdaRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /users/login
            Method: POST

  GetLoadsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cmp-get-loads
      CodeUri: src/
      Handler: handlers/getLoads.handler
      Role: !GetAtt LambdaRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /loads
            Method: GET

  CreateLoadFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cmp-create-load
      CodeUri: src/
      Handler: handlers/createLoad.handler
      Role: !GetAtt LambdaRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /loads
            Method: POST

  UpdateLoadStatusFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cmp-update-load-status
      CodeUri: src/
      Handler: handlers/updateLoadStatus.handler
      Role: !GetAtt LambdaRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /loads/{id}/status
            Method: PATCH

  PostLocationFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cmp-post-location
      CodeUri: src/
      Handler: handlers/postLocation.handler
      Role: !GetAtt LambdaRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /locations
            Method: POST

  GetLocationFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cmp-get-location
      CodeUri: src/
      Handler: handlers/getLocation.handler
      Role: !GetAtt LambdaRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /loads/{id}/location
            Method: GET

  TrackByTokenFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cmp-track-by-token
      CodeUri: src/
      Handler: handlers/trackByToken.handler
      Role: !GetAtt LambdaRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /track/{token}
            Method: GET

  SendDriverLinkFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cmp-send-driver-link
      CodeUri: src/
      Handler: handlers/sendDriverLink.handler
      Role: !GetAtt LambdaRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /loads/{id}/send-driver-link
            Method: POST

  StartTrackingFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cmp-start-tracking
      CodeUri: src/
      Handler: handlers/startTracking.handler
      Role: !GetAtt LambdaRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /track/{token}/start
            Method: POST

  PostLocationPublicFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cmp-post-location-public
      CodeUri: src/
      Handler: handlers/postLocationPublic.handler
      Role: !GetAtt LambdaRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /track/{token}/location
            Method: POST

Outputs:
  ApiBaseUrl:
    Description: "API Gateway base URL - set as CMP_API_BASE in Amplify and AWSConfig.swift"
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
  UsersTableName:
    Value: !Ref UsersTable
  LoadsTableName:
    Value: !Ref LoadsTable
  LocationsTableName:
    Value: !Ref LocationsTable
