<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1a1a2e" />
  <title>CMP Logistics – Driver Tracking</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:    #007AFF;
      --green:   #34C759;
      --orange:  #FF9500;
      --red:     #FF3B30;
      --bg:      #0f0f1a;
      --card:    #1c1c2e;
      --border:  #2c2c3e;
      --text:    #ffffff;
      --muted:   #8e8ea0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 40px;
    }

    .logo {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 24px;
    }

    .card {
      width: 100%;
      max-width: 400px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 16px;
    }

    .card-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .load-number {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .load-desc {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 16px;
    }

    .route-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
    }

    .route-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-top: 4px;
      flex-shrink: 0;
    }

    .route-dot.pickup   { background: var(--blue); }
    .route-dot.delivery { background: var(--green); }

    .route-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .route-address { font-size: 14px; line-height: 1.4; }

    /* Status badge */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      margin-top: 14px;
    }
    .status-badge.pending   { background: rgba(142,142,160,0.15); color: var(--muted); }
    .status-badge.accepted  { background: rgba(175,82,222,0.15);  color: #af52de; }
    .status-badge.active    { background: rgba(52,199,89,0.15);   color: var(--green); }
    .status-badge.stopped   { background: rgba(255,59,48,0.15);   color: var(--red); }

    /* Accept Load card */
    .accept-card {
      width: 100%;
      max-width: 400px;
      background: rgba(175,82,222,0.08);
      border: 1px solid rgba(175,82,222,0.3);
      border-radius: 20px;
      padding: 20px 24px;
      margin-bottom: 16px;
    }
    .accept-card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .accept-icon {
      font-size: 28px;
      line-height: 1;
    }
    .accept-card-title {
      font-size: 16px;
      font-weight: 700;
    }
    .accept-card-sub {
      font-size: 13px;
      color: var(--muted);
      margin-top: 2px;
    }
    .btn-accept {
      background: #af52de;
      color: #fff;
    }

    /* GPS card */
    .gps-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .gps-item { }
    .gps-val {
      font-size: 20px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }
    .gps-unit {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    /* Map */
    #map {
      width: 100%;
      height: 260px;
      border-radius: 14px;
      margin-bottom: 14px;
      overflow: hidden;
      background: #1a1a2e;
    }
    .map-coords {
      display: flex;
      gap: 12px;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .map-coords span { font-variant-numeric: tabular-nums; }

    /* Map */
    #map {
      width: 100%;
      height: 260px;
      border-radius: 14px;
      margin-bottom: 14px;
      overflow: hidden;
      background: #1a1a2e;
    }
    .map-coords {
      display: flex;
      gap: 12px;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .map-coords span { font-variant-numeric: tabular-nums; }

    /* Accuracy bar */
    .accuracy-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 14px;
    }
    .accuracy-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .accuracy-dot.good   { background: var(--green); }
    .accuracy-dot.medium { background: var(--orange); }
    .accuracy-dot.poor   { background: var(--red); }
    .accuracy-text { font-size: 12px; color: var(--muted); }

    /* Big button */
    .btn {
      width: 100%;
      max-width: 400px;
      padding: 20px;
      border: none;
      border-radius: 16px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 12px;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: scale(0.97); opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-start { background: var(--green); color: #fff; }
    .btn-stop  { background: var(--red);   color: #fff; }
    .btn-loading { background: var(--orange); color: #fff; }

    /* Update log */
    .log-item {
      font-size: 12px;
      color: var(--muted);
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }
    .log-item:last-child { border-bottom: none; }
    .log-time { flex-shrink: 0; font-variant-numeric: tabular-nums; }

    /* Error banner */
    /* Error banner */
    .error-banner {
      width: 100%;
      max-width: 400px;
      background: rgba(255,59,48,0.12);
      border: 1px solid rgba(255,59,48,0.35);
      color: #fff;
      padding: 16px;
      border-radius: 14px;
      font-size: 13px;
      margin-bottom: 12px;
      display: none;
      line-height: 1.5;
    }
    .error-banner.visible { display: block; }
    /* Success banner */
    .success-banner {
      width: 100%;
      max-width: 400px;
      background: rgba(52,199,89,0.15);
      border: 1px solid rgba(52,199,89,0.3);
      color: var(--green);
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 13px;
      margin-bottom: 12px;
      display: none;
    }
    .success-banner.visible { display: block; }

    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .skeleton {
      background: linear-gradient(90deg, var(--border) 25%, var(--card) 50%, var(--border) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
      height: 16px;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }

    #delivered-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 16px;
      padding: 40px 0;
    }
    .check-circle {
      width: 80px; height: 80px;
      background: rgba(52,199,89,0.15);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 40px;
    }

    /* Connection status bar */
    #conn-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 9999;
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 600;
      text-align: center;
      display: none;
      transition: opacity 0.3s;
    }
    #conn-bar.offline     { display: block; background: rgba(255,59,48,0.92);  color: #fff; }
    #conn-bar.back-online { display: block; background: rgba(52,199,89,0.92); color: #fff; }
  </style>
</head>
<body>

  <!-- Connection status bar -->
  <div id="conn-bar"></div>

  <p class="logo">CMP Logistics</p>

  <div id="error-banner"   class="error-banner"></div>
  <div id="success-banner" class="success-banner"></div>

  <!-- ── Load Info Card ──────────────────────────────────────────────────── -->
  <div class="card" id="load-card">
    <p class="card-title">Your Load</p>
    <div id="load-number" class="load-number">Your Load</div>
    <div id="load-desc"   class="load-desc">Loading details…</div>

    <div class="route-row">
      <div class="route-dot pickup"></div>
      <div>
        <div class="route-label">Pickup</div>
        <div id="pickup-addr" class="route-address">—</div>
      </div>
    </div>
    <div class="route-row">
      <div class="route-dot delivery"></div>
      <div>
        <div class="route-label">Delivery</div>
        <div id="delivery-addr" class="route-address">—</div>
      </div>
    </div>

    <div id="status-badge" class="status-badge pending">⏳ Pending</div>
  </div>

  <!-- ── Accept Load Card (shown when status = Assigned) ──────────────────── -->
  <div class="accept-card" id="accept-card" style="display:none;">
    <div class="accept-card-header">
      <div class="accept-icon">🔔</div>
      <div>
        <div class="accept-card-title">New Load Assigned</div>
        <div class="accept-card-sub" id="accept-pickup-time">Pickup: —</div>
      </div>
    </div>
    <button id="btn-accept" class="btn btn-accept" onclick="acceptLoad()">✅ Accept Load</button>
  </div>

  <!-- ── GPS / Map Card ──────────────────────────────────────────────────── -->
  <div class="card" id="gps-card" style="display:none;">
    <p class="card-title">Live Location</p>
    <div id="map"></div>
    <div class="map-coords">
      <span id="gps-lat">Lat —</span>
      <span id="gps-lng">Lng —</span>
      <span id="gps-speed"></span>
    </div>
    <div class="accuracy-row">
      <div class="accuracy-dot" id="acc-dot"></div>
      <div class="accuracy-text" id="acc-text">Waiting for GPS…</div>
    </div>
  </div>

  <!-- ── Delivered success screen ───────────────────────────────────────── -->
  <div id="delivered-screen">
    <div class="check-circle">✅</div>
    <h2 style="font-size:22px;">Trip Complete</h2>
    <p style="color:var(--muted);font-size:14px;">
      Tracking has stopped. The dispatcher has been notified.<br>
      You can close this tab.
    </p>
  </div>

  <!-- ── Action Buttons ──────────────────────────────────────────────────── -->
  <button id="btn-start"   class="btn btn-start"   onclick="startTracking()" style="display:none;">🚛 Start Tracking</button>
  <button id="btn-stop"    class="btn btn-stop"    onclick="stopTracking()"   style="display:none;">⏸ Pause Tracking</button>
  <button id="btn-deliver" class="btn"             onclick="markDelivered()"  style="display:none;background:#34C759;color:#fff;">✅ Mark as Delivered</button>

  <!-- ── Update Log ──────────────────────────────────────────────────────── -->
  <div class="card" id="log-card" style="display:none;">
    <p class="card-title">Activity</p>
    <div id="log-list"></div>
  </div>

  <!-- Injects window.CMP_API_BASE – replaced with the real API Gateway URL at build time -->
  <script src="config.js"></script>
  <script>
    const params   = new URLSearchParams(location.search);
    const TOKEN    = params.get("token");
    const LOAD_ID  = params.get("loadId");
    const _rawBase = window.CMP_API_BASE || "";
    const API_BASE = (_rawBase && _rawBase !== "__API_BASE__")
      ? _rawBase.replace(/\/$/, "")
      : null;
    const UPDATE_INTERVAL_MS = 15000;

    let watchId          = null;
    let intervalId       = null;
    let lastPosition     = null;
    let isTracking       = false;
    let updateCount      = 0;
    let loadData         = null;
    let offlineQueue     = [];          // unsent location payloads
    let gpsRestartTimer  = null;        // watchPosition auto-restart timer
    let gpsRestartDelay  = 5000;        // ms before restarting GPS after error

    function isLive() { return !!API_BASE; }

    // ── Web Notifications ─────────────────────────────────────────────────────
    var _pickupReminderTimers = [];

    function requestDriverNotifPermission(onGranted) {
      if (!('Notification' in window)) { if(onGranted) onGranted(false); return; }
      if (Notification.permission === 'granted') { if(onGranted) onGranted(true); return; }
      if (Notification.permission === 'denied')  { if(onGranted) onGranted(false); return; }
      Notification.requestPermission().then(function(p) {
        if(onGranted) onGranted(p === 'granted');
      });
    }

    function driverNotify(title, body) {
      if (!('Notification' in window) || Notification.permission !== 'granted') return;
      try {
        var n = new Notification(title, { body: body || '', tag: title });
        n.onclick = function() { window.focus(); n.close(); };
        setTimeout(function() { n.close(); }, 10000);
      } catch(e) {}
    }

    function schedulePickupReminders(pickupDateStr) {
      // Clear any previously scheduled reminders
      _pickupReminderTimers.forEach(function(t) { clearTimeout(t); });
      _pickupReminderTimers = [];

      if (!pickupDateStr) return;
      var pickupMs = new Date(pickupDateStr).getTime();
      var now = Date.now();

      // 30-minute early warning
      var earlyMs = pickupMs - 30 * 60 * 1000;
      if (earlyMs > now) {
        _pickupReminderTimers.push(setTimeout(function() {
          driverNotify('🚛 Pickup in 30 Minutes',
            (loadData ? 'Load ' + loadData.loadNumber + ': ' : '') +
            'Head to ' + (loadData ? loadData.pickupAddress : 'your pickup location'));
        }, earlyMs - now));
      }

      // On-time pickup alert
      if (pickupMs > now) {
        _pickupReminderTimers.push(setTimeout(function() {
          driverNotify('🚛 Time to Start Driving!',
            (loadData ? 'Load ' + loadData.loadNumber + ' — ' : '') +
            'Pickup: ' + (loadData ? loadData.pickupAddress : 'your pickup location'));
        }, pickupMs - now));
      }
    }

    // ── Connection status bar ─────────────────────────────────────────────────
    var _connHideTimer = null;
    function setConnBar(state) { // 'offline' | 'online' | ''
      var bar = document.getElementById('conn-bar');
      if (state === 'offline') {
        bar.textContent = '📵 No connection — locations queued, will retry when back online';
        bar.className = 'offline';
        if (_connHideTimer) { clearTimeout(_connHideTimer); _connHideTimer = null; }
      } else if (state === 'online') {
        bar.textContent = '✅ Back online — syncing queued locations…';
        bar.className = 'back-online';
        _connHideTimer = setTimeout(function() {
          bar.className = '';
          bar.textContent = '';
        }, 4000);
      } else {
        bar.className = '';
        bar.textContent = '';
      }
    }

    window.addEventListener('offline', function() { setConnBar('offline'); });
    window.addEventListener('online',  function() {
      setConnBar('online');
      flushOfflineQueue();
    });

    (function init() {
      if (!TOKEN && !LOAD_ID) {
        showError("Invalid tracking link — no token found.");
        document.getElementById("btn-start").disabled = true;
        return;
      }
      // Ask for notification permission straight away so reminders can fire
      requestDriverNotifPermission(function(granted) {
        if (granted) {
          driverNotify('🚛 CMP Tracking', 'Notifications enabled — we\'ll remind you at pickup time.');
        }
      });
      loadLoadInfo();
    })();

    // ── Fetch load details — decode from URL first, then localStorage, then API ──
    function loadLoadInfo() {
      try {
        // 1. Try decoding load data embedded in the URL (?d=base64json)
        var dParam = params.get('d');
        if (dParam) {
          try {
            // Unicode-safe decode: matches b64enc(JSON.stringify(...)) in dispatcher
            var decoded = JSON.parse(decodeURIComponent(escape(atob(decodeURIComponent(dParam)))));
            if (decoded && decoded.loadNumber) {
              populateLoad(decoded);
              return;
            }
          } catch(e) {}
        }

        // 2. Try localStorage (same device as dispatcher)
        var stored = JSON.parse(localStorage.getItem('cmp_loads') || '[]');
        var found  = null;
        for (var i = 0; i < stored.length; i++) {
          if ((TOKEN && stored[i].trackingToken === TOKEN) ||
              (LOAD_ID && stored[i].id === LOAD_ID)) {
            found = stored[i]; break;
          }
        }
        if (found) { populateLoad(found); return; }

        // 3. Try backend API
        if (isLive()) {
          fetch(API_BASE + '/track/' + TOKEN)
            .then(function(r) { return r.ok ? r.json() : r.json().then(function(d){ throw new Error(d.error||'Load not found.'); }); })
            .then(function(d) { populateLoad(d); })
            .catch(function(err) {
              document.getElementById('load-number').textContent = 'Load Not Found';
              document.getElementById('load-desc').textContent   = err.message;
              document.getElementById('btn-start').disabled = true;
            });
          return;
        }

        // 4. Nothing found — show clear instructions
        document.getElementById('load-number').textContent = 'No Load Found';
        document.getElementById('load-desc').textContent   = '';
        document.getElementById('pickup-addr').textContent  = 'Check your SMS or email for the tracking link sent by your dispatcher. The link must include your load data.';
        document.getElementById('delivery-addr').textContent = '';
        document.getElementById('status-badge').textContent  = '⚠️ Use link from dispatcher';
        document.getElementById('btn-start').disabled = true;
        document.getElementById('btn-start').textContent = 'Waiting for valid link…';

      } catch(e) {
        document.getElementById('load-number').textContent = 'Error';
        document.getElementById('load-desc').textContent   = e.message;
        document.getElementById('btn-start').disabled = true;
      }
    }

    function populateLoad(data) {
      loadData = data;
      document.getElementById("load-number").textContent   = data.loadNumber || "—";
      document.getElementById("load-desc").textContent     = data.description || "";
      document.getElementById("pickup-addr").textContent   = data.pickupAddress || "—";
      document.getElementById("delivery-addr").textContent = data.deliveryAddress || "—";

      // Schedule pickup time reminders (works for Assigned & Accepted statuses)
      if (data.pickupDate && (data.status === 'Assigned' || data.status === 'Accepted')) {
        schedulePickupReminders(data.pickupDate);
      }

      // New assignment notification
      if (data.status === 'Assigned') {
        driverNotify('📋 New Load Assigned',
          'Load ' + (data.loadNumber || '') + ' — pickup at ' + (data.pickupAddress || ''));
      }

      // Show extra details row if available
      var extras = "";
      if (data.weight)       extras += '<div style="font-size:13px;color:var(--muted);margin-top:6px">⚖️ ' + Number(data.weight).toLocaleString() + ' lbs</div>';
      if (data.pickupDate)   extras += '<div style="font-size:13px;color:var(--muted);margin-top:4px">📅 Pickup: ' + new Date(data.pickupDate).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric",hour:"2-digit",minute:"2-digit"}) + '</div>';
      if (data.deliveryDate) extras += '<div style="font-size:13px;color:var(--muted);margin-top:4px">📅 Delivery by: ' + new Date(data.deliveryDate).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric",hour:"2-digit",minute:"2-digit"}) + '</div>';
      if (data.customerName) extras += '<div style="font-size:13px;color:var(--muted);margin-top:4px">🏢 Customer: ' + data.customerName + '</div>';
      if (data.notes)        extras += '<div style="font-size:13px;color:var(--muted);margin-top:4px;padding:8px;background:rgba(255,255,255,.04);border-radius:8px">📝 ' + data.notes + '</div>';
      if (extras) {
        var extraDiv = document.createElement("div");
        extraDiv.style.marginTop = "10px";
        extraDiv.innerHTML = extras;
        document.getElementById("load-card").appendChild(extraDiv);
      }

      var badge = document.getElementById("status-badge");
      if (data.status === "In Transit") {
        badge.className   = "status-badge active";
        badge.textContent = "🚛 In Transit";
        document.getElementById("btn-start").style.display = "none";
        document.getElementById("btn-stop").style.display  = "flex";
        document.getElementById("gps-card").style.display  = "block";
        isTracking = true;
        loadTrailHistory();
        startGPS(false);
      } else if (data.status === "Delivered") {
        badge.className   = "status-badge stopped";
        badge.textContent = "✅ Delivered";
        document.getElementById("btn-start").style.display = "none";
        document.getElementById("gps-card").style.display  = "none";
        document.getElementById("delivered-screen").style.display = "flex";
      } else if (data.status === "Accepted") {
        badge.className   = "status-badge accepted";
        badge.textContent = "✅ Accepted";
        document.getElementById("gps-card").style.display  = "block";
        document.getElementById("btn-start").style.display = "flex";
      } else {
        // Assigned, Pending, or anything else — always show Accept card
        // (Pending means the link was sent before status was saved as Assigned,
        //  but the driver still needs to accept and start tracking)
        badge.textContent = "⏳ " + (data.status || "Pending");
        document.getElementById("gps-card").style.display   = "none";
        document.getElementById("btn-start").style.display  = "none";
        var acceptCard = document.getElementById("accept-card");
        acceptCard.style.display = "block";
        if (data.pickupDate) {
          document.getElementById("accept-pickup-time").textContent =
            "Pickup: " + new Date(data.pickupDate).toLocaleDateString("en-US", {
              month: "short", day: "numeric", year: "numeric",
              hour: "2-digit", minute: "2-digit"
            });
        }
        // If we have a live backend, check whether the status has already been
        // updated (e.g. dispatcher changed it after sending the link)
        if (isLive() && (TOKEN || LOAD_ID)) {
          var liveUrl = TOKEN ? API_BASE + '/track/' + TOKEN
                              : API_BASE + '/loads/' + LOAD_ID;
          fetch(liveUrl)
            .then(function(r){ return r.ok ? r.json() : null; })
            .then(function(live){
              if (!live) return;
              var liveStatus = live.status || data.status;
              if (liveStatus !== data.status) {
                // Backend has a newer status — re-render with it
                live.pickupDate    = live.pickupDate    || data.pickupDate;
                live.deliveryDate  = live.deliveryDate  || data.deliveryDate;
                live.pickupAddress = live.pickupAddress || data.pickupAddress;
                live.deliveryAddress = live.deliveryAddress || data.deliveryAddress;
                populateLoad(live);
              }
            })
            .catch(function(){});
        }
      }
    }

    // ── Start Tracking ────────────────────────────────────────────────────────
    function startTracking() {
      var btn = document.getElementById('btn-start');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Starting…';
      btn.className = 'btn btn-loading';
      clearError();

      if (!navigator.geolocation) {
        showError('Geolocation is not supported by this browser.');
        resetStartButton(); return;
      }

      navigator.geolocation.getCurrentPosition(
        function(pos) {
          lastPosition = pos;
          updateGPSDisplay(pos);

          // Update status in URL-decoded load
          updateLocalStatus('In Transit');

          // Notify dispatcher via /start (sets In Transit + sends email)
          notifyDispatcher(pos);

          // Belt-and-suspenders: also PATCH status directly so DynamoDB is
          // updated even if /start fails or is slow
          if (isLive() && TOKEN) {
            fetch(API_BASE + '/track/' + TOKEN + '/status', {
              method: 'PATCH',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                status: 'In Transit',
                driverName: loadData ? (loadData.assignedDriverName || 'Driver') : 'Driver',
              }),
            }).catch(function(e) { console.warn('In Transit status patch failed:', e); });
          }

          isTracking = true;
          document.getElementById('status-badge').className   = 'status-badge active';
          document.getElementById('status-badge').textContent = '🚛 In Transit';
          btn.style.display = 'none';
          document.getElementById('btn-stop').style.display    = 'flex';
          document.getElementById('btn-deliver').style.display = 'flex';
          document.getElementById('log-card').style.display    = 'block';
          showSuccess('✅ Tracking started! Dispatcher has been notified.');
          addLog('🚛 Tracking started');
          driverNotify('🚛 Tracking Started', 'Your location is now being shared. Drive safe!');

          postLocation(pos);
          startGPS(true);
        },
        function(err) {
          if (err.code === 1) {
            showError('denied');
          } else {
            showError('Could not get your location: ' + err.message);
          }
          resetStartButton();
        },
        { enableHighAccuracy: true, timeout: 20000, maximumAge: 0 }
      );
    }

    // ── Accept Load ───────────────────────────────────────────────────────────
    function acceptLoad() {
      var btn = document.getElementById('btn-accept');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Accepting…';

      var loadId     = loadData ? loadData.id     : LOAD_ID;
      var loadNumber = loadData ? loadData.loadNumber : '';
      var driverName = loadData ? (loadData.assignedDriverName || 'Driver') : 'Driver';

      function onAccepted() {
        // Update local status
        updateLocalStatus('Accepted');

        // Update badge
        var badge = document.getElementById('status-badge');
        badge.className   = 'status-badge accepted';
        badge.textContent = '✅ Accepted';

        // Re-schedule pickup reminders (in case permission was just granted)
        if (loadData && loadData.pickupDate) schedulePickupReminders(loadData.pickupDate);

        // Hide accept card, reveal tracking controls
        document.getElementById('accept-card').style.display  = 'none';
        document.getElementById('gps-card').style.display     = 'block';
        document.getElementById('btn-start').style.display    = 'flex';

        showSuccess('✅ Load accepted! Dispatcher has been notified. Tap Start Tracking when ready.');
        addLog('✅ Load accepted');
        driverNotify('✅ Load Accepted',
          'Load ' + (loadData ? loadData.loadNumber : '') + ' accepted. Pickup reminders are set.');
      }

      // Try backend accept endpoint
      if (isLive() && TOKEN) {
        // Update status via the public token-based endpoint (no JWT required)
        fetch(API_BASE + '/track/' + TOKEN + '/status', {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status: 'Accepted', driverName: driverName }),
        }).catch(function(){});

        // Also call the dedicated accept endpoint (sends dispatcher email)
        fetch(API_BASE + '/loads/' + loadId + '/accept', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            loadId:          loadId,
            loadNumber:      loadNumber,
            driverName:      driverName,
            dispatcherEmail: loadData ? (loadData.dispatcherEmail || '') : ''
          }),
        })
        .then(function(r) { return r.ok ? r.json() : Promise.reject(r.status); })
        .then(function() { onAccepted(); })
        .catch(function(err) {
          // Graceful fallback — status already patched above, just show UI
          console.warn('Accept endpoint error:', err);
          onAccepted();
        });
      } else {
        // No backend — update locally and open mailto
        onAccepted();
        if (loadData && loadData.dispatcherEmail) {
          var subject = 'Load ' + loadNumber + ' Accepted by ' + driverName;
          var body    = driverName + ' has accepted load ' + loadNumber + '.\nThey are ready to start tracking at pickup time.';
          openMailtoDispatcher(subject, body);
        }
      }
    }

    // ── Notify Dispatcher ─────────────────────────────────────────────────────
    function notifyDispatcher(pos) {
      if (!loadData) return;

      var mapsLink = 'https://maps.google.com/?q=' + pos.coords.latitude + ',' + pos.coords.longitude;
      var subject  = 'Driver Started Tracking - Load ' + (loadData.loadNumber || '');
      var body     = 'Your driver has started tracking for Load ' + (loadData.loadNumber || '') + '.\n\n'
                   + 'Driver: ' + (loadData.assignedDriverName || 'Driver') + '\n'
                   + 'Pickup: '   + (loadData.pickupAddress   || '--') + '\n'
                   + 'Delivery: ' + (loadData.deliveryAddress || '--') + '\n\n'
                   + 'Current location:\n' + mapsLink + '\n\n'
                   + 'GPS: ' + pos.coords.latitude.toFixed(5) + ', ' + pos.coords.longitude.toFixed(5);

      // Try backend first
      if (isLive()) {
        fetch(API_BASE + '/track/' + TOKEN + '/start', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            latitude: pos.coords.latitude,
            longitude: pos.coords.longitude,
            dispatcherEmail: loadData.dispatcherEmail || '',
            notifyCustomer:  loadData.notifyCustomer  || false,
          }),
        }).catch(function() { openMailtoDispatcher(subject, body); });
        return;
      }

      // No backend — open mailto so dispatcher gets an email
      openMailtoDispatcher(subject, body);
    }

    function openMailtoDispatcher(subject, body) {
      if (!loadData || !loadData.dispatcherEmail) return;
      var link = 'mailto:' + loadData.dispatcherEmail
               + '?subject=' + encodeURIComponent(subject)
               + '&body='    + encodeURIComponent(body);
      // Open silently — driver shouldn't have to do anything
      var a = document.createElement('a');
      a.href = link;
      a.style.display = 'none';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    // ── Mark Delivered ────────────────────────────────────────────────────────
    function markDelivered() {
      if (!confirm("Mark this load as Delivered?")) return;

      var btn = document.getElementById('btn-deliver');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Saving…';

      function doDeliver(attempt) {
        if (!isLive() || !TOKEN) {
          finishDelivered(); return;
        }
        fetch(API_BASE + "/track/" + TOKEN + "/status", {
          method: "PATCH",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            status: "Delivered",
            driverName: loadData ? (loadData.assignedDriverName || "Driver") : "Driver",
          }),
        })
        .then(function(r) {
          if (!r.ok) return r.json().then(function(d) { throw new Error(d.error || ("HTTP " + r.status)); });
          finishDelivered();
        })
        .catch(function(err) {
          console.error("markDelivered attempt " + attempt + " failed:", err);
          if (attempt < 3) {
            setTimeout(function() { doDeliver(attempt + 1); }, 2000 * attempt);
          } else {
            // All retries failed — still mark locally but warn driver
            finishDelivered();
            showError("⚠️ Could not reach server after 3 tries (" + (err.message || "network error") + "). Status saved locally — ask dispatcher to update manually if needed.");
          }
        });
      }

      function finishDelivered() {
        stopGPS();
        isTracking = false;
        updateLocalStatus("Delivered");
        document.getElementById("btn-stop").style.display    = "none";
        document.getElementById("btn-deliver").style.display = "none";
        document.getElementById("status-badge").className    = "status-badge stopped";
        document.getElementById("status-badge").textContent  = "✅ Delivered";
        document.getElementById("delivered-screen").style.display = "flex";
        addLog("✅ Marked as Delivered");
        driverNotify('📦 Delivery Complete!',
          'Load ' + (loadData ? loadData.loadNumber : '') + ' marked as delivered. Great work!');
      }

      doDeliver(1);
    }

    function updateLocalStatus(newStatus) {
      var stored = JSON.parse(localStorage.getItem("cmp_loads") || "[]");
      var updated = false;
      for (var i = 0; i < stored.length; i++) {
        if ((TOKEN  && stored[i].trackingToken === TOKEN)  ||
            (LOAD_ID && stored[i].id           === LOAD_ID)) {
          stored[i].status = newStatus;
          updated = true;
          break;
        }
      }
      // If not found in stored loads, add a minimal record so dispatcher can see it
      if (!updated && loadData) {
        var entry = JSON.parse(JSON.stringify(loadData));
        entry.status = newStatus;
        stored.push(entry);
      }
      localStorage.setItem("cmp_loads", JSON.stringify(stored));
      if (loadData) loadData.status = newStatus;
    }

    // ── Stop Tracking ─────────────────────────────────────────────────────────
    function stopTracking() {
      isTracking = false;
      stopGPS();
      updateLocalStatus("Pending");
      document.getElementById("btn-stop").style.display    = "none";
      document.getElementById("btn-deliver").style.display = "none";
      document.getElementById("btn-start").style.display   = "flex";
      document.getElementById("status-badge").className    = "status-badge pending";
      document.getElementById("status-badge").textContent  = "⏸ Paused";
      resetStartButton();
      addLog("⏸ Tracking paused");
    }

    // ── GPS Helpers ───────────────────────────────────────────────────────────
    function startGPS(fresh) {
      if (gpsRestartTimer) { clearTimeout(gpsRestartTimer); gpsRestartTimer = null; }
      if (watchId != null) { navigator.geolocation.clearWatch(watchId); watchId = null; }

      watchId = navigator.geolocation.watchPosition(
        function(pos) {
          gpsRestartDelay = 5000; // reset back-off on success
          lastPosition = pos;
          updateGPSDisplay(pos);
        },
        function(err) {
          if (err.code === 1) { // PERMISSION_DENIED — permanent, don't retry
            showError('denied');
          } else {
            // Timeout or POSITION_UNAVAILABLE — auto-restart after delay
            navigator.geolocation.clearWatch(watchId);
            watchId = null;
            if (isTracking) {
              gpsRestartTimer = setTimeout(function() {
                if (isTracking) startGPS(false);
              }, gpsRestartDelay);
              // Exponential back-off, cap at 60 s
              gpsRestartDelay = Math.min(gpsRestartDelay * 2, 60000);
            }
          }
        },
        { enableHighAccuracy: true, maximumAge: 5000, timeout: 20000 }
      );

      if (!intervalId) {
        intervalId = setInterval(function() {
          if (lastPosition && isTracking) {
            postLocation(lastPosition);
          }
        }, UPDATE_INTERVAL_MS);
      }
    }

    function stopGPS() {
      if (gpsRestartTimer) { clearTimeout(gpsRestartTimer); gpsRestartTimer = null; }
      if (watchId != null)    { navigator.geolocation.clearWatch(watchId); watchId = null; }
      if (intervalId != null) { clearInterval(intervalId); intervalId = null; }
    }

    // ── Map setup ─────────────────────────────────────────────────────────────
    var map = null, mapMarker = null, mapCircle = null, trailPolyline = null;
    // trailPoints stores raw GPS coords as {lat, lng, ts} objects
    var trailPoints = [];
    var snapDebounceTimer = null;
    var snapInFlight = false;

    function initMap(lat, lng) {
      if (map) return;
      map = L.map('map', { zoomControl: true, attributionControl: false }).setView([lat, lng], 15);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19
      }).addTo(map);
      var truckIcon = L.divIcon({
        html: '<div style="font-size:28px;line-height:1;filter:drop-shadow(0 2px 4px rgba(0,0,0,.5))">🚛</div>',
        className: '',
        iconSize: [32, 32],
        iconAnchor: [16, 16]
      });
      mapMarker = L.marker([lat, lng], { icon: truckIcon }).addTo(map);
      mapCircle = L.circle([lat, lng], { radius: 20, color: '#007AFF', fillColor: '#007AFF', fillOpacity: 0.15, weight: 2 }).addTo(map);
      // Trail polyline — updated by road-snap or raw fallback
      trailPolyline = L.polyline([], {
        color: '#007AFF',
        weight: 5,
        opacity: 0.85,
        lineJoin: 'round',
        lineCap: 'round',
      }).addTo(map);
    }

    // Snap trailPoints to roads via OSRM /route — works everywhere, no API key needed.
    // Falls back to raw GPS if OSRM is unreachable.
    function snapAndDrawTrail() {
      if (!trailPolyline || trailPoints.length < 2) {
        if (trailPolyline && trailPoints.length === 1) {
          trailPolyline.setLatLngs([[trailPoints[0].lat, trailPoints[0].lng]]);
        }
        return;
      }

      // Sample down to ≤25 waypoints (OSRM /route limit)
      var pts = trailPoints;
      if (pts.length > 25) {
        var step = (pts.length - 1) / 24;
        var sampled = [];
        for (var i = 0; i < 24; i++) sampled.push(pts[Math.round(i * step)]);
        sampled.push(pts[pts.length - 1]);
        pts = sampled;
      }

      var coords = pts.map(function(p) { return p.lng + ',' + p.lat; }).join(';');
      var url = 'https://router.project-osrm.org/route/v1/driving/' + coords
              + '?overview=full&geometries=geojson&steps=false';

      snapInFlight = true;
      fetch(url)
        .then(function(r) { return r.json().catch(function() { return null; }); })
        .then(function(data) {
          snapInFlight = false;
          if (data && data.code === 'Ok' && data.routes && data.routes.length) {
            var roadCoords = data.routes[0].geometry.coordinates.map(function(c) { return [c[1], c[0]]; });
            if (roadCoords.length >= 2) {
              trailPolyline.setLatLngs(roadCoords);
              return;
            }
          }
          // OSRM returned nothing useful — keep raw GPS trail
          trailPolyline.setLatLngs(trailPoints.map(function(p) { return [p.lat, p.lng]; }));
        })
        .catch(function() {
          snapInFlight = false;
          if (trailPolyline) {
            trailPolyline.setLatLngs(trailPoints.map(function(p) { return [p.lat, p.lng]; }));
          }
        });
    }

    // Debounce: wait 2 s after last GPS tick before calling OSRM
    function scheduleSnap() {
      if (snapDebounceTimer) clearTimeout(snapDebounceTimer);
      snapDebounceTimer = setTimeout(function() {
        if (!snapInFlight) snapAndDrawTrail();
      }, 2000);
    }

    function updateMap(lat, lng, accuracy) {
      var ts = Math.floor(Date.now() / 1000);
      trailPoints.push({ lat: lat, lng: lng, ts: ts });
      if (!map) { initMap(lat, lng); return; }
      mapMarker.setLatLng([lat, lng]);
      mapCircle.setLatLng([lat, lng]);
      mapCircle.setRadius(accuracy || 20);
      map.panTo([lat, lng]);
      // Draw raw trail immediately (no visual gap), then snap to roads asynchronously
      trailPolyline.setLatLngs(trailPoints.map(function(p) { return [p.lat, p.lng]; }));
      scheduleSnap();
    }

    // Load existing trail from API when resuming a trip
    function loadTrailHistory() {
      if (!isLive() || !TOKEN) return;
      fetch(API_BASE + '/track/' + TOKEN)
        .then(function(r) { return r.ok ? r.json() : null; })
        .then(function(data) {
          if (!data || !data.locationHistory || data.locationHistory.length < 2) return;
          trailPoints = data.locationHistory.map(function(p) {
            return {
              lat: p.latitude,
              lng: p.longitude,
              ts: p.timestamp ? Math.floor(new Date(p.timestamp).getTime() / 1000) : 0
            };
          });
          if (trailPolyline) {
            trailPolyline.setLatLngs(trailPoints.map(function(p) { return [p.lat, p.lng]; }));
          }
          snapAndDrawTrail();
        })
        .catch(function() {});
    }

    function updateGPSDisplay(pos) {
      var c = pos.coords;
      document.getElementById("gps-lat").textContent  = "Lat " + c.latitude.toFixed(5);
      document.getElementById("gps-lng").textContent  = "Lng " + c.longitude.toFixed(5);
      var spd = c.speed != null ? (c.speed * 2.237).toFixed(1) + " mph" : "";
      document.getElementById("gps-speed").textContent = spd;

      var acc  = c.accuracy;
      var dot  = document.getElementById("acc-dot");
      var text = document.getElementById("acc-text");
      if (acc <= 20)       { dot.className = "accuracy-dot good";   text.textContent = "±" + Math.round(acc) + "m — Good signal"; }
      else if (acc <= 100) { dot.className = "accuracy-dot medium"; text.textContent = "±" + Math.round(acc) + "m — Fair signal"; }
      else                 { dot.className = "accuracy-dot poor";   text.textContent = "±" + Math.round(acc) + "m — Poor signal"; }

      updateMap(c.latitude, c.longitude, c.accuracy);
    }

    // ── POST location to API (with offline queue + auto-retry) ─────────────
    function postLocation(pos) {
      updateCount++;
      if (!isLive()) return;
      var c = pos.coords;
      var payload = {
        latitude:  c.latitude,
        longitude: c.longitude,
        speed:     c.speed   != null ? c.speed * 2.237 : 0,
        heading:   c.heading != null ? c.heading : 0,
        timestamp: new Date().toISOString(),
      };

      if (!navigator.onLine) {
        offlineQueue.push(payload);
        setConnBar('offline');
        return;
      }

      sendLocationPayload(payload);
    }

    function sendLocationPayload(payload) {
      fetch(API_BASE + "/track/" + TOKEN + "/location", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      }).catch(function() {
        offlineQueue.push(payload);
        setConnBar('offline');
      });
    }

    function flushOfflineQueue() {
      if (!isLive() || offlineQueue.length === 0) return;
      var queue = offlineQueue.slice();
      offlineQueue = [];
      queue.forEach(function(payload) { sendLocationPayload(payload); });
    }

    // ── Log helpers ───────────────────────────────────────────────────────────
    function addLog(msg) {
      const list = document.getElementById("log-list");
      const now  = new Date().toLocaleTimeString();
      const item = document.createElement("div");
      item.className = "log-item";
      item.innerHTML = `<span class="log-time">${now}</span><span>${msg}</span>`;
      list.prepend(item);
      // Keep last 20 entries
      while (list.children.length > 20) list.removeChild(list.lastChild);
    }

            <div style="font-size:13px;line-height:1.7;">
              1. Open <strong>Settings</strong> → <strong>"Apps"</strong> → <strong>"Chrome"</strong><br>
              2. Tap <strong>"Permissions"</strong> → <strong>"Location"</strong><br>

        } else {
          // Desktop / unknown browser fallback
          html += `
          <div style="background:rgba(255,255,255,0.06);border-radius:10px;padding:12px 14px;margin-bottom:10px;">
            <div style="font-size:13px;line-height:1.7;">

        html += `
          <button onclick="location.reload()"
            style="width:100%;background:#007AFF;color:#fff;border:none;border-radius:12px;
                   padding:14px;font-size:16px;font-weight:700;cursor:pointer;margin-top:4px;
                   -webkit-tap-highlight-color:transparent;">
            🔄 Reload Page
          </button>
          <div style="font-size:11px;color:#8e8ea0;margin-top:8px;text-align:center;">
            After changing settings, always reload the page before tapping Start Tracking.
          </div>`;

        el.innerHTML = html;
      } else {
        el.textContent = msg;
      }
      el.classList.add("visible");
    }
    function clearError() {
      document.getElementById("error-banner").classList.remove("visible");
    }
    function showSuccess(msg) {
      const el = document.getElementById("success-banner");
      el.textContent = msg;
      el.classList.add("visible");
      setTimeout(() => el.classList.remove("visible"), 6000);
    }

    function resetStartButton() {
      const btn = document.getElementById("btn-start");
      btn.disabled  = false;
      btn.className = "btn btn-start";
      btn.textContent = "🚛 Start Tracking";
    }

    // Keep screen awake while tracking (Safari 16.4+)
    var wakeLock = null;
    document.getElementById("btn-start").addEventListener("click", function() {
      if ("wakeLock" in navigator) {
        navigator.wakeLock.request("screen").then(function(wl){ wakeLock=wl; }).catch(function(){});
      }
    });
    document.addEventListener("visibilitychange", function() {
      if (wakeLock !== null && document.visibilityState === "visible") {
        navigator.wakeLock.request("screen").then(function(wl){ wakeLock=wl; }).catch(function(){});
      }
      // When the driver comes back to the tab while tracking, restart GPS if it dropped
      if (isTracking && document.visibilityState === "visible" && watchId === null) {
        startGPS(false);
      }
      // Flush any queued locations when coming back online
      if (document.visibilityState === "visible" && navigator.onLine) {
        flushOfflineQueue();
      }
    });

    // ── Service Worker registration (background sync + keep-alive) ────────────
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('driver-tracking-sw.js')
        .then(function(reg) {
          console.log('[SW] registered, scope:', reg.scope);
          // Request background sync when back online
          window.addEventListener('online', function() {
            if (reg.sync) {
              reg.sync.register('cmp-location-sync').catch(function(){});
            }
          });
        })
        .catch(function(err) {
          console.warn('[SW] registration failed:', err);
        });

      // Listen for keep-alive pings from the service worker
      navigator.serviceWorker.addEventListener('message', function(evt) {
        if (evt.data && evt.data.type === 'SW_KEEPALIVE') {
          // Re-request wake lock and restart GPS if it dropped
          if (wakeLock === null && isTracking && 'wakeLock' in navigator) {
            navigator.wakeLock.request('screen').then(function(wl){ wakeLock = wl; }).catch(function(){});
          }
          if (isTracking && watchId === null && !gpsRestartTimer) {
            startGPS(false);
          }
        }
      });
    }
  </script>
</body>
